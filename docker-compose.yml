services:
  relayguard-panel:
    build:
      context: .
      dockerfile: Dockerfile.panel
    container_name: relayguard-panel
    restart: unless-stopped
    ports:
      - "7080:7080"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      # 首次初始化可指定管理员密码；留空则随机生成并打印到日志
      # - ADMIN_PASSWORD=请改成强密码
